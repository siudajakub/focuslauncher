name: Build Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Test, build, sign, and publish release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM tests
        run: ./gradlew test --stacktrace

      - name: Decode keystore
        env:
          ENCODED_STRING: ${{ secrets.KEYSTORE }}
        run: |
          TMP_KEYSTORE_FILE_PATH="${RUNNER_TEMP}"/keystore
          mkdir -p "${TMP_KEYSTORE_FILE_PATH}"
          printf '%s' "$ENCODED_STRING" | base64 --decode > "${TMP_KEYSTORE_FILE_PATH}"/keystore.jks

      - name: Build and sign release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleDefaultRelease --stacktrace

      - name: Stage signed APK
        run: |
          mkdir -p dist
          cp app/app/build/outputs/apk/default/release/app-default-release.apk \
             "dist/FocusLauncher-${GITHUB_REF_NAME}.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: focuslauncher-release-apk
          path: dist/FocusLauncher-*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FocusLauncher-*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
