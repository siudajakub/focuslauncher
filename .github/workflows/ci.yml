name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent-docs:
    name: Agent documentation and skills
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate agent documentation
        run: python3 tools/check_agent_docs.py

  build-and-test:
    name: JVM tests and debug build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM tests and assemble default debug APK
        run: ./gradlew test :app:app:assembleDefaultDebug --stacktrace

  migration-tests:
    name: Room migration tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Report exported schema coverage
        shell: bash
        run: |
          schema="data/database/schemas/de.mm20.launcher2.database.AppDatabase/37.json"
          if [[ ! -f "$schema" ]]; then
            echo "::warning file=$schema::Room schema 37 (the current AppDatabase version) is not exported. Runtime migration validation will still run; exported-schema validation for the current version is unavailable."
          fi
          # Historical schemas 25-36 are not committed: Room only exports the current
          # version's schema, so they cannot be regenerated from v37 source. Their absence
          # is expected and non-fatal; migration correctness is covered by the instrumented
          # AppDatabaseMigrationTest below rather than by exported-schema validation.

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run database migration tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          disable-animations: true
          script: ./gradlew :data:database:connectedDebugAndroidTest --stacktrace
