name: Build Nightly APK

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  build:
    name: Test, build, and sign nightly APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM tests
        run: ./gradlew test --stacktrace

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.KEYSTORE }}
        run: |
          TMP_KEYSTORE_FILE_PATH="${RUNNER_TEMP}"/keystore
          mkdir -p "${TMP_KEYSTORE_FILE_PATH}"
          printf '%s' "$ENCODED_STRING" | base64 --decode > "${TMP_KEYSTORE_FILE_PATH}"/keystore.jks

      - name: Override version code based on date
        run: echo "VERSION_CODE_OVERRIDE=$(date +%Y%m%d00)" >> "$GITHUB_ENV"

      - name: Build and sign APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleDefaultNightly

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: de.mm20.launcher2.nightly.apk
          path: app/app/build/outputs/apk/default/nightly/app-default-nightly.apk
          if-no-files-found: error
